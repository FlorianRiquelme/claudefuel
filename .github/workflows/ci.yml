name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck -S warning statusline.sh setup.sh tests/fixtures/compare_versions.sh

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
      - run: bats --print-output-on-failure tests/
